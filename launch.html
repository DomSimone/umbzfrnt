<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Umbuzo AI - Launching Interface</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
        }
        
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.18);
            max-width: 500px;
        }
        
        .logo {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        
        h1 {
            margin: 0 0 10px 0;
            font-size: 2.5rem;
            font-weight: 700;
        }
        
        p {
            font-size: 1.1rem;
            margin-bottom: 30px;
            opacity: 0.9;
        }
        
        .status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            font-size: 1.2rem;
            font-weight: 500;
        }
        
        .dot {
            width: 12px;
            height: 12px;
            background: #4ade80;
            border-radius: 50%;
            animation: blink 1.5s infinite;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            width: 0%;
            background: #4ade80;
            transition: width 0.3s ease;
        }
        
        .btn {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            margin-top: 10px;
        }
        
        .btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <!-- Simple SVG logo -->
            <svg viewBox="0 0 64 64" fill="none">
                <circle cx="32" cy="32" r="30" stroke="white" stroke-width="2" fill="none"/>
                <path d="M20 24 L44 24 L32 48 Z" fill="white"/>
                <circle cx="32" cy="32" r="8" fill="white" opacity="0.5"/>
            </svg>
        </div>
        
        <h1>Umbuzo AI</h1>
        <p>Initializing backend services and launching frontend interface...</p>
        
        <div class="status">
            <div class="dot"></div>
            <span>System Status: Checking Backend</span>
        </div>
        
        <div class="progress-bar">
            <div class="progress-fill" id="progress"></div>
        </div>
        
        <div id="status-message">Verifying model loading and API endpoints...</div>
        
        <div id="launch-section" class="hidden">
            <p style="margin-bottom: 20px; color: #4ade80; font-weight: bold;">
                ✅ All systems operational!
            </p>
            <a href="/index.html" class="btn" id="launch-btn">Launch Frontend Interface</a>
            <p style="margin-top: 20px; font-size: 0.9rem; opacity: 0.7;">
                Redirecting in <span id="countdown">5</span> seconds...
            </p>
        </div>
    </div>

    <script>
        let progress = 0;
        const progressEl = document.getElementById('progress');
        const statusMessage = document.getElementById('status-message');
        const launchSection = document.getElementById('launch-section');
        const countdownEl = document.getElementById('countdown');
        const launchBtn = document.getElementById('launch-btn');
        
        const messages = [
            "Initializing FastAPI backend...",
            "Loading model configuration...",
            "Checking Hugging Face repository access...",
            "Verifying model download capability...",
            "Starting WebSocket connections...",
            "Finalizing frontend assets...",
            "All systems ready!"
        ];
        
        let messageIndex = 0;
        const interval = setInterval(() => {
            progress += 14.3; // 100 / 7 messages
            progressEl.style.width = Math.min(progress, 100) + '%';
            
            if (messageIndex < messages.length) {
                statusMessage.textContent = messages[messageIndex];
                messageIndex++;
            }
            
            if (progress >= 100) {
                clearInterval(interval);
                launchSection.classList.remove('hidden');
                startCountdown();
            }
        }, 500);
        
        function startCountdown() {
            let count = 5;
            const countdownInterval = setInterval(() => {
                count--;
                countdownEl.textContent = count;
                
                if (count <= 0) {
                    clearInterval(countdownInterval);
                    window.location.href = '/index.html';
                }
            }, 1000);
        }
        
        // Auto-launch after 3 seconds if not already redirected
        setTimeout(() => {
            if (!launchSection.classList.contains('hidden')) {
                window.location.href = '/index.html';
            }
        }, 3000);
    </script>
</body>
</html>
